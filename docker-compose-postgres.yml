version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: monkhq_postgres
    environment:
      POSTGRES_DB: monkhq
      POSTGRES_USER: monkhq_user
      POSTGRES_PASSWORD: monkhq_secure_password_2024
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres_optimization/neo_postgres.conf:/etc/postgresql/postgresql.conf
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    networks:
      - monkhq_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U monkhq_user -d monkhq"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  redis:
    image: redis:7-alpine
    container_name: monkhq_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - monkhq_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  django:
    build: .
    container_name: monkhq_django
    environment:
      - DB_NAME=monkhq
      - DB_USER=monkhq_user
      - DB_PASSWORD=monkhq_secure_password_2024
      - DB_HOST=postgres
      - DB_PORT=5432
      - REDIS_URL=redis://redis:6379/1
      - SECRET_KEY=django-insecure-change-this-in-production
      - DEBUG=True
      - ALLOWED_HOSTS=localhost,127.0.0.1
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - monkhq_network
    command: >
      sh -c "python setup_postgres.py &&
               python manage.py runserver 0.0.0.0:8000"
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  static_volume:
    driver: local
  media_volume:
    driver: local

networks:
  monkhq_network:
    driver: bridge
