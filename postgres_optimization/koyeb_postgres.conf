# PostgreSQL Configuration for Koyeb Production
# Optimized for production environment with high performance and reliability

# CONNECTION SETTINGS
listen_addresses = '*'                  # Listen on all interfaces for Koyeb
port = 5432                             # Default PostgreSQL port
max_connections = 200                   # Higher connection limit for production
superuser_reserved_connections = 5      # Reserve more connections for superusers

# MEMORY SETTINGS (Optimized for Koyeb's 2GB RAM instances)
shared_buffers = 512MB                  # 25% of RAM for shared buffers
effective_cache_size = 1.5GB            # 75% of RAM for effective cache size
work_mem = 8MB                          # Higher work_mem for complex queries
maintenance_work_mem = 128MB            # More memory for maintenance operations
checkpoint_completion_target = 0.9      # Target checkpoint completion
wal_buffers = 32MB                      # Larger WAL buffer for production
default_statistics_target = 1000        # Higher statistics target for better planning

# WAL SETTINGS (Production-optimized)
wal_level = replica                     # Enable WAL archiving for replication
max_wal_size = 2GB                      # Larger WAL size for production
min_wal_size = 160MB                    # Larger minimum WAL size
checkpoint_timeout = 15min              # Longer checkpoint timeout for production
wal_compression = on                    # Compress WAL files
wal_sync_method = fsync                 # Safe WAL sync method
wal_writer_delay = 200ms                # WAL writer delay
wal_writer_flush_after = 1MB            # Flush WAL after 1MB

# QUERY PLANNER (Production-optimized)
random_page_cost = 1.1                  # SSD optimization
effective_io_concurrency = 300          # Higher concurrent I/O for production
seq_page_cost = 1.0                     # Sequential page cost
cpu_tuple_cost = 0.01                   # CPU tuple cost
cpu_index_tuple_cost = 0.005            # Index tuple cost
cpu_operator_cost = 0.0025              # Operator cost
jit = on                                # Enable JIT compilation
jit_inline_above_cost = 500000          # JIT inline threshold
jit_optimize_above_cost = 500000       # JIT optimization threshold

# LOGGING (Production-ready)
log_destination = 'stderr'              # Log to stderr
logging_collector = on                  # Enable logging collector
log_directory = 'log'                   # Log directory
log_filename = 'postgresql-%Y-%m-%d_%H%M%S.log'  # Log filename format
log_rotation_age = 1d                   # Rotate logs daily
log_rotation_size = 50MB                # Smaller rotation for production monitoring
log_min_messages = warning              # Minimum log level
log_min_error_statement = error         # Log error statements
log_connections = on                    # Log connections
log_disconnections = on                 # Log disconnections
log_duration = on                      # Log query duration
log_statement = 'mod'                   # Log DDL and DML statements
log_checkpoints = on                    # Log checkpoints
log_lock_waits = on                     # Log lock waits
log_temp_files = 10MB                   # Log temp files over 10MB
log_autovacuum_min_duration = 0         # Log all autovacuum activity

# AUTOVACUUM SETTINGS (Production-tuned)
autovacuum = on                         # Enable autovacuum
autovacuum_max_workers = 5              # More autovacuum workers for production
autovacuum_naptime = 30s                # More frequent autovacuum
autovacuum_vacuum_threshold = 50        # Vacuum threshold
autovacuum_vacuum_scale_factor = 0.1    # Lower scale factor for more frequent vacuum
autovacuum_analyze_threshold = 50       # Analyze threshold
autovacuum_analyze_scale_factor = 0.05   # Lower scale factor for more frequent analyze
autovacuum_vacuum_cost_delay = 5ms      # Lower vacuum cost delay for production
autovacuum_vacuum_cost_limit = 200      # Vacuum cost limit

# REPLICATION SETTINGS (For Koyeb scaling)
max_wal_senders = 3                     # Maximum WAL senders
wal_keep_segments = 32                  # Keep WAL segments
hot_standby = on                        # Enable hot standby
max_standby_archive_delay = 30s         # Max standby archive delay
max_standby_streaming_delay = 30s       # Max standby streaming delay
wal_receiver_status_interval = 10s      # WAL receiver status interval

# CLIENT CONNECTION DEFAULTS
default_text_search_config = 'pg_catalog.english'  # Text search config
timezone = 'UTC'                        # Default timezone
lc_messages = 'en_US.UTF-8'            # Message locale
lc_monetary = 'en_US.UTF-8'            # Monetary locale
lc_numeric = 'en_US.UTF-8'              # Numeric locale
lc_time = 'en_US.UTF-8'                 # Time locale
default_locale = 'en_US.UTF-8'          # Default locale

# EXTENSIONS (Production-ready)
shared_preload_libraries = 'pg_stat_statements,auto_explain,pg_stat_kcache'  # Preload useful extensions

# PERFORMANCE MONITORING (Production)
track_activities = on                    # Track activities
track_counts = on                       # Track counts
track_io_timing = on                    # Track I/O timing
track_functions = all                   # Track all functions
track_activity_query_size = 2048        # Larger activity query size
pg_stat_statements.track = all          # Track all statements
pg_stat_statements.max = 10000          # Max statements to track
pg_stat_statements.save = on            # Save statements

# AUTO EXPLAIN (Production)
auto_explain.log_min_duration = 500     # Lower threshold for production monitoring
auto_explain.log_analyze = on           # Include analyze output
auto_explain.log_verbose = on           # Include verbose output
auto_explain.log_format = json          # JSON format for easier parsing
auto_explain.log_nested_statements = on # Explain nested statements
auto_explain.sample_rate = 0.1          # Sample 10% of queries to avoid overhead

# SECURITY SETTINGS (Production)
ssl = on                                # Enable SSL
ssl_cert_file = '/var/lib/postgresql/server.crt'  # SSL certificate
ssl_key_file = '/var/lib/postgresql/server.key'    # SSL private key
password_encryption = scram-sha-256      # Strong password encryption
row_security = on                       # Enable row security

# RESOURCE MANAGEMENT (Production)
statement_timeout = 300000               # 5 minute statement timeout
lock_timeout = 60000                    # 1 minute lock timeout
idle_in_transaction_session_timeout = 60000  # 1 minute idle transaction timeout
vacuum_cost_limit = 200                 # Vacuum cost limit
vacuum_cost_delay = 5ms                 # Vacuum cost delay

# CHECKPOINT SETTINGS (Production)
checkpoint_segments = 64                 # Checkpoint segments
checkpoint_completion_target = 0.9      # Target checkpoint completion
checkpoint_warning = 30s                # Checkpoint warning

# ARCHIVING SETTINGS (Production)
archive_mode = on                       # Enable archiving
archive_command = 'cp %p /var/lib/postgresql/archive/%f'  # Archive command
archive_timeout = 300                    # Archive timeout
