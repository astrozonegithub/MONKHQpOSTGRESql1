version: '3.8'

services:
  django:
    build: .
    container_name: monkhq_django_neon
    environment:
      # Your specific Neon PostgreSQL Database URL
      - DATABASE_URL=postgresql://neondb_owner:npg_OKZUyG06jRIE@ep-tiny-field-an0w3uqj-pooler.c-6.us-east-1.aws.neon.tech/neondb?sslmode=require&channel_binding=require
      # Django Configuration
      - SECRET_KEY=django-insecure-change-this-in-production-please
      - DEBUG=True
      - ALLOWED_HOSTS=localhost,127.0.0.1
      # Optional: Redis Cache
      - REDIS_URL=redis://redis:6379/1
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    depends_on:
      - redis
    networks:
      - monkhq_network
    command: >
      sh -c "python manage.py migrate &&
               python manage.py collectstatic --noinput &&
               python manage.py runserver 0.0.0.0:8000"
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: monkhq_redis_neon
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - monkhq_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  redis_data:
    driver: local
  static_volume:
    driver: local
  media_volume:
    driver: local

networks:
  monkhq_network:
    driver: bridge
